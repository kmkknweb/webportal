<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>เข้าสู่ระบบ | ระบบใบประกาศนียบัตร</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@300;400;500&family=Noto+Sans+Thai:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans Thai',sans-serif;
  min-height:100vh;
  background:#f9eaed;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.wrap{width:100%;max-width:400px;}
.card{
  background:#fff;
  border-radius:20px;
  padding:40px 36px;
  box-shadow:0 4px 40px rgba(0,0,0,0.08);
}
.logo-area{text-align:center;margin-bottom:28px;}
.logo-area img{width:60px;height:60px;object-fit:contain;margin-bottom:10px;}
.logo-area h1{
  font-family:'Noto Serif Thai',serif;
  font-size:20px;font-weight:500;color:#1a1a1a;line-height:1.4;
}
.logo-area p{font-size:13px;color:#888;margin-top:4px;}
.divider{height:1px;background:#eee;margin:24px 0;}
label{display:block;font-size:13px;color:#555;margin-bottom:6px;font-weight:500;}
.input-wrap{position:relative;margin-bottom:16px;}
input{
  width:100%;padding:12px 14px;
  border:1.5px solid #e0e0e0;border-radius:10px;
  font-size:14px;font-family:'Noto Sans Thai',sans-serif;
  color:#1a1a1a;background:#fafafa;transition:border-color .2s;
}
input:focus{outline:none;border-color:#7a0019;background:#fff;}
.eye{
  position:absolute;right:12px;top:14px;
  cursor:pointer;font-size:18px;user-select:none;
}
.btn{
  width:100%;padding:13px;background:#7a0019;color:#fff;
  border:none;border-radius:10px;font-size:15px;
  font-family:'Noto Sans Thai',sans-serif;font-weight:500;
  cursor:pointer;transition:.2s;margin-top:4px;
}
.btn:hover{background:#5c0013;}
#msg{font-size:13px;color:#c0392b;margin-top:10px;text-align:center;min-height:18px;}
.back{text-align:center;margin-top:20px;font-size:13px;color:#888;}
.back a{color:#7a0019;text-decoration:none;font-weight:500;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo-area">
      <img src="logo.png" alt="โลโก้สมาคม" onerror="this.style.display='none'"/>
      <h1>ระบบใบประกาศนียบัตร</h1>
      <p>สมาคมปึงเถ่ากงม่าขอนแก่น</p>
    </div>
    <div class="divider"></div>
    <label>อีเมล</label>
    <div class="input-wrap">
      <input type="email" id="email" placeholder="กรอกอีเมล"/>
    </div>
    <label>รหัสผ่าน</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="กรอกรหัสผ่าน"/>
      <span class="eye" onclick="togglePass()">👁</span>
    </div>
    <button class="btn" onclick="login()">เข้าสู่ระบบ</button>
    <p id="msg"></p>
  </div>
  <div class="back">
    <a href="index.html">← กลับหน้าแรก</a>
  </div>
</div>

<script>
function togglePass() {
  const input = document.getElementById('password');
  const el = event.target;
  if (input.type === 'password') { input.type = 'text'; el.textContent = '🙈'; }
  else { input.type = 'password'; el.textContent = '👁'; }
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBmjtm6PqzmPmDzV4rt7W0HH_PUDhUhsDs",
  authDomain: "certificate-d089d.firebaseapp.com",
  projectId: "certificate-d089d",
  storageBucket: "certificate-d089d.firebasestorage.app",
  messagingSenderId: "970100893986",
  appId: "1:970100893986:web:021ce443e4534ffe751d7b"
};

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw6BOd7OMN_9z0UjIDE9NlEzBGfK0GbaaNFUIaEDD5T4HBNisQBL-p3dPvqXMtv2RQCLQ/exec';

/* ✅ เพิ่ม email ที่มีสิทธิ์ได้ที่นี่ */
const WHITELIST = [
  'kongmakhonkaen@gmail.com',
  /* เพิ่ม email ถัดไปตรงนี้ครับ */
];

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const msg = document.getElementById('msg');
  if (!email || !password) { msg.innerText = 'กรุณากรอกอีเมลและรหัสผ่าน'; return; }
  msg.innerText = 'กำลังเข้าสู่ระบบ...';
  msg.style.color = '#888';
  signInWithEmailAndPassword(auth, email, password)
    .then((result) => {
      if (!WHITELIST.includes(result.user.email)) {
        msg.style.color = '#c0392b';
        msg.innerText = 'ไม่มีสิทธิ์เข้าถึงระบบนี้';
        auth.signOut();
        return;
      }
      window.open(APPS_SCRIPT_URL, '_blank');
      msg.style.color = '#2e7d32';
      msg.innerText = '✓ เข้าสู่ระบบสำเร็จ กำลังเปิดระบบสร้างใบประกาศ...';
    })
    .catch(() => { msg.style.color = '#c0392b'; msg.innerText = 'อีเมลหรือรหัสผ่านไม่ถูกต้อง'; });
};
</script>
</body>
</html>
