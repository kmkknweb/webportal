<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Noto Sans Thai',sans-serif;
  background:#f9eaed;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box{
  background:#fff;
  padding:30px;
  border-radius:16px;
  width:300px;
}
input{
  width:100%;
  padding:10px;
  margin:10px 0;
}
button{
  width:100%;
  padding:10px;
  background:#8c1d2c;
  color:#fff;
  border:none;
}
</style>
</head>

<body>

<div class="box">
  <h2>เข้าสู่ระบบ</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p id="msg"></p>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDiOZLBL_3y-Js4rkhsYuvZper1mOhWG6I",
  authDomain: "webportal-kmkkn.firebaseapp.com",
  projectId: "webportal-kmkkn"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  signInWithEmailAndPassword(auth, email, password)
    .then(()=>{
      document.getElementById('msg').innerText = "เข้าสู่ระบบสำเร็จ";
      window.location.href = "systems.html";
    })
    .catch(err=>{
      document.getElementById('msg').innerText = "ผิดพลาด: "+err.message;
    });
}
</script>

</body>
</html>
