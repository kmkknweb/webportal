<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>เข้าสู่ระบบ</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Noto Sans Thai',sans-serif;
  background:#EADADA;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* กล่องหลัก */
.login-container{
  width:100%;
  max-width:520px;
  padding:20px;
}

.login-card{
  background:#F5F5F5;
  border-radius:28px;
  padding:40px 35px;
}

/* title */
h2{
  margin-bottom:30px;
  font-weight:600;
}

/* input */
.input{
  width:100%;
  padding:16px;
  border:2px solid #BFBFBF;
  border-radius:8px;
  font-size:16px;
  outline:none;
}

/* password wrapper */
.input-group{
  position:relative;
}

.input-group input{
  padding-right:50px;
}

/* eye icon */
.eye{
  position:absolute;
  right:15px;
  top:50%;
  transform:translateY(-50%);
  font-size:20px;
  cursor:pointer;
}

/* button */
.login-btn{
  width:100%;
  margin-top:25px;
  padding:15px;
  background:#8B1E2D;
  color:#fff;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}

/* mobile */
@media(max-width:480px){
  .login-card{
    padding:30px 20px;
  }
}
</style>
</head>

<body>

<div class="login-container">

  <div class="login-card">

    <h2>เข้าสู่ระบบ สำหรับผู้บริหาร</h2>

    <input class="input" type="text" placeholder="Email">

    <br><br>

    <div class="input-group">
      <input id="password" class="input" type="password" placeholder="Password">
      <span class="eye" onclick="togglePassword()">👁️</span>
    </div>

    <button class="login-btn">Login</button>

  </div>

</div>

<script>
function togglePassword(){
  const p = document.getElementById('password');
  p.type = p.type === 'password' ? 'text' : 'password';
}
</script>

</body>
</html>
