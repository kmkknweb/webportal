<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ระบบประปา</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@500&family=Noto+Sans+Thai&display=swap" rel="stylesheet"/>

<style>
body{
  font-family:'Noto Sans Thai',sans-serif;
  margin:0;
  background:#f5f1ec;
}
.top{
  background:#fff;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #eee;
}
.brand{display:flex;align-items:center;gap:10px}
.brand img{width:42px}
h1{font-family:'Noto Serif Thai';font-size:18px;margin:0}

.container{padding:20px}
button{
  margin:6px;
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#b8860b;
  color:#fff;
  cursor:pointer;
}
button:hover{background:#8b6508}

.file{margin:6px 0}
iframe{
  width:100%;
  height:500px;
  border:none;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="top">
  <div class="brand">
    <img src="logo.png">
    <h1>ระบบประปา / สุขาภิบาล</h1>
  </div>
  <a href="systemsportal.html">← กลับ</a>
</div>

<div class="container">

<button onclick="load('water')">น้ำดี</button>
<button onclick="load('drainage')">ระบายน้ำ</button>
<button onclick="load('wastewater')">น้ำเสีย</button>
<button onclick="load('septic')">บำบัด</button>

<div id="list"></div>
<iframe id="viewer"></iframe>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbzAD4RuGKahvFRpVHQsRUU1qWbiKRylx3kKwEPrLZY24TF9uKNjCCN52CsLl6OMR4-JEA/exec";

function load(type){
  fetch(API+"?system=Watersupply&type="+type)
  .then(r=>r.json())
  .then(data=>{
    let html="";
    data.forEach(f=>{
      html+=`<div class="file">
        <a href="#" onclick="show('${f.viewUrl}')">${f.name}</a>
      </div>`;
    });
    document.getElementById("list").innerHTML=html;
  });
}

function show(url){
  document.getElementById("viewer").src=url;
}
</script>

</body>
</html>
