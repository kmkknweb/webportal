<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบประปา และระบบสุขาภิบาล</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Noto Sans Thai',sans-serif;
  background:linear-gradient(180deg,#f6efe7,#eee2d3);
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 20px;
  background:#fffaf6;
  border-bottom:1px solid #eee;
}
.brand{
  display:flex;
  align-items:center;
  gap:12px;
}
.brand img{
  width:48px;
}
.title{
  font-size:18px;
  font-weight:800;
}
.sub{
  font-size:12px;
  color:#777;
}
.back{
  background:#7a0019;
  color:#fff;
  padding:8px 14px;
  border-radius:999px;
  text-decoration:none;
}

/* HERO */
.hero{
  padding:20px;
  background:#fff;
}
.hero h2{
  margin:0;
  font-size:24px;
}
.hero p{
  margin-top:6px;
  color:#666;
  font-size:14px;
  line-height:1.8;
}

/* BUTTONS */
.buttons{
  padding:15px;
}
button{
  margin:6px;
  padding:10px 14px;
  border:none;
  border-radius:12px;
  background:#b68a52;
  color:#fff;
  font-weight:600;
  cursor:pointer;
  font-family:'Noto Sans Thai',sans-serif;
  font-size:13px;
}
button:hover{
  background:#8f6a34;
}

/* FILE LIST */
.file-summary{
  padding:10px 18px 0;
  color:#7a6d66;
  font-size:13px;
  font-family:'Noto Sans Thai',sans-serif;
}

#list{
  padding:10px 20px;
}

.file-table-wrap{
  overflow-x:auto;
  margin-top:4px;
}

.file-table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  border:1px solid #eadfd5;
  border-radius:14px;
  overflow:hidden;
  font-family:'Noto Sans Thai',sans-serif;
}

.file-table thead th{
  background:#faf4ef;
  color:#5c0013;
  font-size:13px;
  font-weight:700;
  text-align:left;
  padding:12px 14px;
  border-bottom:1px solid #eadfd5;
}

.file-table tbody td{
  font-size:14px;
  padding:12px 14px;
  border-bottom:1px solid #f1e7de;
  vertical-align:middle;
}

.file-table tbody tr:last-child td{
  border-bottom:none;
}

.file-table tbody tr:hover{
  background:#fffaf6;
}

.file-no{
  width:72px;
  color:#7a6d66;
}

.file-name{
  color:#2f1f1f;
  font-weight:500;
  word-break:break-word;
}

.file-action a{
  display:inline-block;
  padding:7px 12px;
  border-radius:10px;
  background:#7a0019;
  color:#fff;
  text-decoration:none;
  font-size:13px;
  font-weight:600;
  font-family:'Noto Sans Thai',sans-serif;
}

.file-action a:hover{
  background:#5c0013;
}

/* EMPTY */
.empty{
  text-align:center;
  padding:40px;
  color:#777;
  font-size:14px;
}

/* PDF */
iframe{
  width:100%;
  height:500px;
  border:none;
  margin-top:10px;
  background:#fff;
}
</style>
</head>

<body>

<div class="header">
  <div class="brand">
    <img src="logo.png" alt="logo">
    <div>
      <div class="title">สมาคมปึงเถ่ากงม่าขอนแก่น</div>
      <div class="sub">ระบบประปา และระบบสุขาภิบาล</div>
    </div>
  </div>
  <a href="systemsportal.html" class="back">กลับ</a>
</div>

<div class="hero">
  <h2>ระบบประปา และระบบสุขาภิบาล</h2>
  <p>เลือกหมวดที่ต้องการเพื่อดูเอกสารระบบน้ำดี ระบบระบายน้ำ ระบบน้ำเสีย และระบบบำบัดสุขาภิบาลภายในศาลเจ้า</p>
</div>

<div class="buttons">
  <button onclick="load('water')">ระบบน้ำดี</button>
  <button onclick="load('drainage')">ระบบระบายน้ำ</button>
  <button onclick="load('wastewater')">ระบบน้ำเสีย</button>
  <button onclick="load('septic')">ระบบบำบัด</button>
</div>

<div class="file-summary" id="fileCount">จำนวนไฟล์: -</div>
<div id="list"></div>
<div id="empty" class="empty">เลือกหมวดเพื่อเริ่มใช้งาน</div>
<iframe id="viewer"></iframe>

<script>
const API="https://script.google.com/macros/s/AKfycbzAD4RuGKahvFRpVHQsRUU1qWbiKRylx3kKwEPrLZY24TF9uKNjCCN52CsLl6OMR4-JEA/exec";

function load(type){
  fetch(API+"?system=Watersupply&type="+type)
  .then(r=>r.json())
  .then(data=>{
    if(data.length===0){
      document.getElementById("list").innerHTML="";
      document.getElementById("fileCount").innerHTML="จำนวนไฟล์: 0 ไฟล์";
      document.getElementById("empty").innerHTML="❗ ไม่มีแบบแปลนในหมวดนี้";
      document.getElementById("viewer").src="";
      return;
    }

    document.getElementById("empty").innerHTML="";
    document.getElementById("fileCount").innerHTML="จำนวนไฟล์: " + data.length + " ไฟล์";

    let html = `
      <div class="file-table-wrap">
        <table class="file-table">
          <thead>
            <tr>
              <th class="file-no">ลำดับ</th>
              <th>ชื่อไฟล์</th>
              <th style="width:120px;">เปิดเอกสาร</th>
            </tr>
          </thead>
          <tbody>
    `;

    data.forEach((f,index)=>{
      html += `
        <tr>
          <td class="file-no">${index + 1}</td>
          <td class="file-name">${f.name}</td>
          <td class="file-action"><a href="#" onclick="show('${f.viewUrl}');return false;">เปิด</a></td>
        </tr>`;
    });

    html += `
          </tbody>
        </table>
      </div>`;

    document.getElementById("list").innerHTML=html;
    show(data[0].viewUrl);
  });
}

function show(url){
  document.getElementById("viewer").src=url;
}
</script>

</body>
</html>
