<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finance</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Noto Sans Thai',sans-serif;
  background:linear-gradient(180deg,#f6efe7,#eee2d3);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:22px 24px;
  background:#fffaf6;
  border-bottom:1px solid #eee;
}
.brand{
  display:flex;
  align-items:center;
  gap:12px;
}
.brand img{width:55px}
.title{font-weight:800}
.back{
  background:#7a0019;
  color:#fff;
  padding:8px 14px;
  border-radius:999px;
  text-decoration:none;
}

/* CONTENT */
.wrap{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* LIST */
.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#fff;
  border-radius:14px;
  padding:14px;
  margin-bottom:10px;
  border:1px solid #eee;
  transition:.2s;
}
.item.active{
  border:2px solid #7a0019;
  background:#fff7f7;
}
.btn{
  background:#7a0019;
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
    font-family:'Noto Sans Thai',sans-serif;
}

/* PREVIEW */
.preview{
  margin-top:20px;
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.preview-top{
  display:flex;
  justify-content:space-between;
  padding:12px 16px;
  background:#faf4ef;
  border-bottom:1px solid #eee;
}

.preview-actions button{
  margin-left:6px;
  border:none;
  background:#7a0019;
  color:#fff;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  font-family:'Noto Sans Thai',sans-serif;
}

#viewer{
  width:100%;
  height:600px;
  border:none;
}

.empty{
  padding:40px;
  text-align:center;
  color:#777;
}
</style>
</head>

<body>

<div class="header">
  <div class="brand">
    <img src="logo.png">
    <div>
      <div class="title">สมาคมปึงเถ่ากงม่าขอนแก่น</div>
      <div style="font-size:12px;color:#777">รายงานการเงิน</div>
    </div>
  </div>
  <a href="systems.html" class="back">กลับ</a>
</div>

<div class="wrap">

  <!-- LIST -->
  <div id="fileList">

    <!-- ===== เพิ่มไฟล์ตรงนี้ ===== -->
    <div class="item" onclick="openPDF(this,'https://drive.google.com/file/d/1YBcPflWWuBwBHbnT50zal63QwLPU6HVw/preview')">
      <div>รายงานการเงิน 2568</div>
      <button class="btn">เปิด</button>
    </div>

  </div>

  <!-- PREVIEW -->
  <div class="preview">
    <div class="preview-top">
      <div id="fileName">ยังไม่ได้เลือกเอกสาร</div>

      <div class="preview-actions">
        <button onclick="openNewTab()">เปิดใหม่</button>
        <button onclick="fullscreen()">เต็มจอ</button>
      </div>
    </div>

    <div id="empty" class="empty">เลือกเอกสารเพื่อแสดงตัวอย่าง</div>

    <iframe id="viewer" hidden></iframe>
  </div>

</div>

<script>
let currentURL = null;

function openPDF(el,url){
  currentURL = url;

  // highlight
  document.querySelectorAll('.item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');

  // set name
  document.getElementById('fileName').innerText = el.innerText;

  // show pdf
  document.getElementById('viewer').src = url;
  document.getElementById('viewer').hidden = false;
  document.getElementById('empty').style.display='none';

  // scroll ลง
  document.querySelector('.preview').scrollIntoView({behavior:'smooth'});
}

function openNewTab(){
  if(currentURL) window.open(currentURL);
}

function fullscreen(){
  let iframe = document.getElementById("viewer");
  if (iframe.requestFullscreen) iframe.requestFullscreen();
}
</script>

</body>
</html>
