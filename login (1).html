<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Noto Sans Thai',sans-serif;
  background:#f9eaed;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.box{
  background:#fff;
  padding:30px;
  border-radius:16px;
  width:300px;
}
input{
  width:100%;
  padding:10px;
  margin:10px 0;
}
button{
  width:100%;
  padding:10px;
  background:#8c1d2c;
  color:#fff;
  border:none;
}
</style>
</head>

<body>

<div class="box">
  <h2>เข้าสู่ระบบ</h2>

  <input type="email" id="email" placeholder="Email">
  <div style="position:relative;">
    <input type="password" id="password" placeholder="Password" style="padding-right:44px;">
    <span onclick="togglePass()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:18px;user-select:none;">👁</span>
  </div>

  <button onclick="login()">Login</button>

  <p id="msg"></p>
</div>

<script>
function togglePass() {
  const input = document.getElementById('password');
  const el = event.target;
  if (input.type === 'password') { input.type = 'text'; el.textContent = '🙈'; }
  else { input.type = 'password'; el.textContent = '👁'; }
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDiOZLBL_3y-Js4rkhsYuvZper1mOhWG6I",
  authDomain: "webportal-kmkkn.firebaseapp.com",
  projectId: "webportal-kmkkn"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  signInWithEmailAndPassword(auth, email, password)
    .then(() => { window.location.href = 'index.html'; })
    .catch(err => { document.getElementById('msg').innerText = "ผิดพลาด: " + err.message; });
}
</script>

</body>
</html>
