<select id="type">
  <option value="boardmeeting">Board Meeting</option>
  <option value="honormeeting">Honor Meeting</option>
  <option value="workpartymeeting">Work Party</option>
</select>

<button onclick="loadFiles()">Load</button>

<div id="list"></div>

<script>
const API_URL = "ใส่ URL Apps Script ตรงนี้";

function loadFiles() {
  const type = document.getElementById("type").value;

  fetch(API_URL + "?type=" + type)
    .then(res => res.json())
    .then(data => {
      let html = "";
      data.forEach(file => {
        html += `
          <div>
            <p>${file.name}</p>
            <iframe src="${file.url}" width="100%" height="400"></iframe>
          </div>
        `;
      });
      document.getElementById("list").innerHTML = html;
    });
}
</script>
