<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ระบบงานสำคัญ</title>

<style>
body{font-family:sans-serif;background:#f9eaed;margin:0}
.container{max-width:1000px;margin:auto;padding:20px}
  

h1{margin-bottom:10px}
.section{margin-top:30px}
.card{
  background:#fff;
  border-radius:12px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  {
  font-family:'Noto Sans Thai', sans-serif;
  h1,h2,h3{
  font-family:'Noto Serif Thai', serif;
  }
}
.badge{font-size:12px;padding:4px 10px;border-radius:999px;color:#fff}
.green{background:#2e7d32}
.yellow{background:#c69214}
.red{background:#8c1d2c}
</style>
</head>

<body>

<div class="container">

<h1>ระบบงานสำคัญ</h1>

<!-- เอกสาร -->
<div class="section">
<h2>แผนผังและเอกสาร</h2>

<div class="card">
<span class="badge yellow">ทั่วไป</span>
<h3>ผังไฟฟ้า</h3>
<p>แสดงตำแหน่งระบบไฟฟ้า</p>
</div>

<div class="card">
<span class="badge yellow">ภายใน</span>
<h3>ผังประปา</h3>
<p>แสดงตำแหน่งระบบน้ำ</p>
</div>

</div>

<!-- ระบบ -->
<div class="section">
<h2>ระบบออนไลน์</h2>

<div class="card">
<span class="badge red">สำคัญ</span>
<h3>ระบบทรัพย์สิน</h3>
<p>ระบบจัดการทรัพย์สิน</p>
</div>

<div class="card">
<span class="badge red">สำคัญ</span>
<h3>ระบบเอกสาร</h3>
<p>ระบบจัดเก็บเอกสาร</p>
</div>

</div>

</div>

</body>
</html>
