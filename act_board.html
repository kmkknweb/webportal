<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>กระดานติดตามกิจกรรม | สมาคมปึงเถ่ากงม่าขอนแก่น</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; font-family: 'Kanit', sans-serif !important; }
    body { margin:0; background:#f7f1e7; color:#2b211a; }
    header, main { width:min(1220px,100%); margin:auto; padding:16px; }

    .hero {
      display:grid; grid-template-columns:auto 1fr; gap:18px; align-items:center;
      background:linear-gradient(135deg,#741313,#9f1d1d 55%,#b88223);
      color:white; border-radius:30px; padding:24px;
      box-shadow:0 14px 34px rgba(94,43,18,.14);
    }
    .logo-wrap {
      width:92px; height:92px; border-radius:24px; background:white;
      display:flex; align-items:center; justify-content:center; overflow:hidden;
    }
    .logo-wrap img { width:78px; height:78px; object-fit:contain; }
    .org-name { margin:0 0 4px; font-size:clamp(18px,3.8vw,30px); font-weight:700; }
    h1 { margin:0 0 8px; font-size:clamp(26px,5vw,44px); }
    .hero p { margin:0; line-height:1.7; opacity:.94; }

    .toolbar, .tabs {
      display:grid; grid-template-columns:1.4fr .8fr .8fr auto; gap:10px; margin:18px 0;
    }

    input, select, textarea, button {
      width:100%; border:1px solid #eadfce; border-radius:16px;
      padding:12px 14px; font-size:15px; background:white; color:#2b211a;
    }
    button {
      border:0; color:white; background:linear-gradient(135deg,#9f1d1d,#741313);
      font-weight:600; cursor:pointer;
    }
    button.secondary { background:#7d7167; }
    button.gold { background:linear-gradient(135deg,#d3a13a,#a86f16); }
    textarea { min-height:92px; resize:vertical; }

    .tabbar { display:flex; gap:10px; margin:6px 0 16px; }
    .tab-btn {
      width:auto; padding:10px 18px; border-radius:999px; background:#fff; color:#741313;
      border:1px solid #eadfce; box-shadow:none;
    }
    .tab-btn.active { background:#9f1d1d; color:white; }

    .layout { display:grid; grid-template-columns:1.15fr .85fr; gap:16px; align-items:start; }
    .card {
      background:rgba(255,255,255,.94); border:1px solid #eadfce;
      border-radius:22px; box-shadow:0 14px 34px rgba(94,43,18,.11); padding:18px;
    }
    .card-title { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:12px; }
    .card-title h2 { margin:0; font-size:22px; }
    .small-note { color:#7d7167; font-size:13px; }

    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .full { grid-column:1 / -1; }
    label { display:block; font-size:13px; color:#7d7167; margin:2px 0 6px; }

    .activity {
      border:1px solid #eadfce; border-radius:20px; padding:14px; margin-bottom:12px;
      background:linear-gradient(180deg,#fffdf9,#fff9ef);
    }
    .activity-top { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .activity h3 { margin:0 0 7px; font-size:19px; }
    .meta { color:#7d7167; font-size:14px; line-height:1.65; }

    .badge {
      display:inline-flex; white-space:nowrap; padding:6px 11px; border-radius:999px;
      font-size:13px; font-weight:600; color:white;
    }
    .status-todo { background:#d84343; }
    .status-doing { background:#e0a51a; color:#2d2004; }
    .status-done { background:#2e9d62; }

    .support-list { margin-top:12px; padding-top:10px; border-top:1px dashed #eadfce; }
    .support-item {
      display:grid; grid-template-columns:1fr auto; gap:10px; padding:10px 0;
      border-bottom:1px solid #f0e8db; font-size:14px; line-height:1.58;
    }
    .support-item:last-child { border-bottom:0; }
    .support-title { font-weight:600; color:#741313; }
    .support-actions select, .activity-actions select {
      padding:8px 10px; font-size:13px; border-radius:12px;
    }
    .activity-actions {
      margin-top:10px; display:grid; grid-template-columns:1fr 150px; gap:8px; align-items:center;
    }

    .empty, .loading, .error-box {
      color:#7d7167; padding:20px; text-align:center; border:1px dashed #eadfce;
      border-radius:18px; background:#fffdf8; line-height:1.7;
    }
    .error-box { color:#d84343; background:#fff4f4; }

    .more-row { margin-top:12px; display:flex; gap:10px; justify-content:center; }

    .toast {
      position:fixed; left:50%; bottom:18px; transform:translateX(-50%) translateY(20px);
      background:#222; color:white; padding:12px 18px; border-radius:999px;
      opacity:0; transition:.2s; z-index:999;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    @media (max-width:900px) {
      .toolbar, .layout, .form-grid, .activity-actions { grid-template-columns:1fr; }
      .hero { grid-template-columns:1fr; text-align:center; }
      .logo-wrap { margin:auto; }
      .support-item { grid-template-columns:1fr; }
      .tabbar { flex-direction:column; }
      .tab-btn { width:100%; }
    }
  </style>
</head>

<body>
<header>
  <section class="hero">
    <div class="logo-wrap">
      <img src="logo.png" alt="โลโก้สมาคมปึงเถ่ากงม่าขอนแก่น" onerror="this.style.display='none'">
    </div>
    <div>
      <p class="org-name">สมาคมปึงเถ่ากงม่าขอนแก่น</p>
      <h1>กระดานติดตามกิจกรรม</h1>
      <p>บันทึกกิจกรรม แม่งาน ทีมสนับสนุน สถานะ และสิ่งที่ต้องประสานงานร่วมกัน</p>
    </div>
  </section>
</header>

<main>
  <section class="toolbar">
    <input id="searchInput" type="search" placeholder="ค้นหากิจกรรม / ทีม / ผู้รับผิดชอบ" oninput="renderBoard()">
    <select id="statusFilter" onchange="renderBoard()"><option value="">ทุกสถานะ</option></select>
    <select id="teamFilter" onchange="renderBoard()"><option value="">ทุกทีม</option></select>
    <button type="button" onclick="loadData()">รีเฟรช</button>
  </section>

  <div class="tabbar">
    <button class="tab-btn active" id="currentTabBtn" onclick="switchTab('current')">งานปัจจุบัน</button>
    <button class="tab-btn" id="oldTabBtn" onclick="switchTab('old')">งานเก่า</button>
  </div>

  <section class="layout">
    <div class="card">
      <div class="card-title">
        <h2 id="boardTitle">งานปัจจุบัน</h2>
        <span class="small-note" id="summaryText">-</span>
      </div>
      <div id="activityBoard" class="loading">กำลังโหลดข้อมูล...</div>
      <div class="more-row" id="moreRow" style="display:none;">
        <button type="button" class="secondary" onclick="toggleShowAllCurrent()" id="showAllBtn">ดูทั้งหมด</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><h2>สร้างกิจกรรม</h2></div>

      <form id="activityForm" onsubmit="submitActivity(event)">
        <div class="form-grid">
          <div class="full">
            <label>ชื่อกิจกรรม</label>
            <input id="activityName" placeholder="เช่น งานไหว้เจ้า / งานประชุม" required>
          </div>
          <div>
            <label>ทีมแม่งาน</label>
            <select id="ownerTeam" required><option value="">เลือกทีมแม่งาน</option></select>
          </div>
          <div>
            <label>ผู้รับผิดชอบหลัก</label>
            <input id="ownerName" placeholder="ชื่อผู้รับผิดชอบ" required>
          </div>
          <div>
            <label>วันที่กิจกรรม</label>
            <input id="eventDate" type="date">
          </div>
          <div>
            <label>สถานะกิจกรรม</label>
            <select id="activityStatus"></select>
          </div>
          <div class="full">
            <label>หมายเหตุ</label>
            <textarea id="activityNote"></textarea>
          </div>
          <div class="full">
            <button id="activitySubmitBtn" type="submit" class="gold">บันทึกกิจกรรมใหม่</button>
          </div>
        </div>
      </form>

      <hr style="border:0;border-top:1px solid #eadfce;margin:20px 0;">

      <div class="card-title"><h2>เพิ่มคำขอสนับสนุน</h2></div>

      <form id="supportForm" onsubmit="submitSupport(event)">
        <div class="form-grid">
          <div class="full">
            <label>เลือกกิจกรรม</label>
            <select id="activityId" required><option value="">เลือกกิจกรรม</option></select>
          </div>
          <div>
            <label>ทีมที่ต้องการให้ช่วย</label>
            <select id="requestTeam" required><option value="">เลือกทีม</option></select>
          </div>
          <div>
            <label>กำหนดเสร็จ</label>
            <input id="deadline" type="date">
          </div>
          <div class="full">
            <label>หัวข้อที่ต้องการให้ช่วย</label>
            <input id="requestTitle" placeholder="เช่น จัดโต๊ะ / ทำป้าย / ประสานเสียง" required>
          </div>
          <div class="full">
            <label>รายละเอียด</label>
            <textarea id="requestDetail"></textarea>
          </div>
          <div>
            <label>ผู้ประสานงาน</label>
            <input id="responsible" placeholder="ชื่อผู้ประสานงาน">
          </div>
          <div>
            <label>สถานะคำขอ</label>
            <select id="requestStatus"></select>
          </div>
          <div class="full">
            <button id="supportSubmitBtn" type="submit">บันทึกคำขอสนับสนุน</button>
          </div>
        </div>
      </form>
    </div>
  </section>
</main>

<div id="toast" class="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzzQom_VZilScTqaoeor4D6MRIfnxs_knKEr0Jc9dZspSfVxOC8_NhvjpX7spnB2k95Iw/exec';

let activities = [];
let supportRequests = [];
let teams = [];
let statuses = ['รอดำเนินการ', 'กำลังดำเนินการ', 'เสร็จแล้ว'];

let activeTab = 'current';
let showAllCurrent = false;

document.addEventListener('DOMContentLoaded', loadData);

function apiGet(action) {
  return new Promise((resolve, reject) => {
    const cb = 'jsonp_' + Date.now() + '_' + Math.floor(Math.random() * 100000);

    window[cb] = function(json) {
      delete window[cb];
      script.remove();

      if (!json.success) {
        reject(new Error(json.message || 'เกิดข้อผิดพลาด'));
        return;
      }
      resolve(json.data);
    };

    const script = document.createElement('script');
    script.src = API_URL + '?action=' + encodeURIComponent(action) + '&callback=' + cb + '&t=' + Date.now();
    script.onerror = function() {
      delete window[cb];
      script.remove();
      reject(new Error('โหลดข้อมูลจาก Apps Script ไม่ได้'));
    };

    document.body.appendChild(script);
  });
}

async function apiPost(action, payload) {
  await fetch(API_URL + '?action=' + encodeURIComponent(action), {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify(payload)
  });
  await delay(1000);
  await loadData(false);
}

async function loadData(showToastMessage = true) {
  const board = document.getElementById('activityBoard');
  board.innerHTML = '<div class="loading">กำลังโหลดข้อมูล...</div>';

  try {
    const data = await apiGet('getBoardData');
    activities = data.activities || [];
    supportRequests = data.supportRequests || [];
    teams = data.teams || [];
    statuses = data.statuses || statuses;

    fillDropdowns();
    renderBoard();
    if (showToastMessage) showToast('โหลดข้อมูลเรียบร้อยแล้ว');
  } catch (err) {
    board.innerHTML = '<div class="error-box">โหลดข้อมูลไม่สำเร็จ<br>' + escapeHtml(err.message) + '</div>';
  }
}

function switchTab(tab) {
  activeTab = tab;
  showAllCurrent = false;

  document.getElementById('currentTabBtn').classList.toggle('active', tab === 'current');
  document.getElementById('oldTabBtn').classList.toggle('active', tab === 'old');
  document.getElementById('boardTitle').textContent = tab === 'current' ? 'งานปัจจุบัน' : 'งานเก่า';

  renderBoard();
}

function toggleShowAllCurrent() {
  showAllCurrent = !showAllCurrent;
  renderBoard();
}

function fillDropdowns() {
  fillStatusSelect('statusFilter', true);
  fillStatusSelect('activityStatus', false);
  fillStatusSelect('requestStatus', false);
  fillTeamSelect('teamFilter', true);
  fillTeamSelect('ownerTeam', false);
  fillTeamSelect('requestTeam', false);
  fillActivitySelect();
}

function fillStatusSelect(id, includeAll) {
  const el = document.getElementById(id);
  el.innerHTML = includeAll ? '<option value="">ทุกสถานะ</option>' : '';
  statuses.forEach(s => el.innerHTML += `<option value="${escapeAttr(s)}">${escapeHtml(s)}</option>`);
}

function fillTeamSelect(id, includeAll) {
  const el = document.getElementById(id);
  el.innerHTML = includeAll ? '<option value="">ทุกทีม</option>' : '<option value="">เลือกทีม</option>';
  teams.forEach(t => {
    const name = t.teamName || '';
    el.innerHTML += `<option value="${escapeAttr(name)}">${escapeHtml(name)}</option>`;
  });
}

function fillActivitySelect() {
  const el = document.getElementById('activityId');
  el.innerHTML = '<option value="">เลือกกิจกรรม</option>';

  activities
    .filter(a => a.status !== 'เสร็จแล้ว')
    .forEach(a => {
      el.innerHTML += `<option value="${escapeAttr(a.activityId)}">${escapeHtml(a.activityName)}</option>`;
    });
}

function renderBoard() {
  const board = document.getElementById('activityBoard');
  const moreRow = document.getElementById('moreRow');
  const showAllBtn = document.getElementById('showAllBtn');

  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const team = document.getElementById('teamFilter').value;

  let base = activeTab === 'current'
    ? activities.filter(a => a.status !== 'เสร็จแล้ว')
    : activities.filter(a => a.status === 'เสร็จแล้ว');

  let filtered = base.filter(a => {
    const related = supportRequests.filter(s => s.activityId === a.activityId);
    const text = [
      a.activityId, a.activityName, a.ownerTeam, a.ownerName, a.status, a.note,
      ...related.flatMap(s => [s.requestId, s.requestTeam, s.requestTitle, s.requestDetail, s.responsible, s.status])
    ].join(' ').toLowerCase();

    const matchSearch = !q || text.includes(q);
    const matchStatus = !status || a.status === status || related.some(s => s.status === status);
    const matchTeam = !team || a.ownerTeam === team || related.some(s => s.requestTeam === team);
    return matchSearch && matchStatus && matchTeam;
  });

  filtered.sort((a, b) => {
    const da = new Date(a.eventDate || '2100-01-01');
    const db = new Date(b.eventDate || '2100-01-01');
    return da - db;
  });

  let visible = filtered;

  if (activeTab === 'current' && !showAllCurrent) {
    visible = filtered.slice(0, 3);
  }

  document.getElementById('summaryText').textContent =
    activeTab === 'current'
      ? `แสดง ${visible.length} จาก ${filtered.length} งานปัจจุบัน`
      : `${filtered.length} งานเก่า`;

  moreRow.style.display = activeTab === 'current' && filtered.length > 3 ? 'flex' : 'none';
  showAllBtn.textContent = showAllCurrent ? 'ย่อเหลือ 3 รายการ' : 'ดูทั้งหมด';

  if (!visible.length) {
    board.innerHTML = '<div class="empty">ยังไม่พบข้อมูลที่ตรงกับเงื่อนไข</div>';
    return;
  }

  board.innerHTML = visible.map(renderActivity).join('');
}

function renderActivity(a) {
  const related = supportRequests.filter(s => s.activityId === a.activityId);
  const supportHtml = related.length
    ? related.map(renderSupportItem).join('')
    : '<div class="support-item"><div class="meta">ยังไม่มีคำขอสนับสนุน</div></div>';

  return `
    <article class="activity">
      <div class="activity-top">
        <div>
          <h3>${escapeHtml(a.activityName || '-')}</h3>
          <div class="meta">
            รหัสระบบ: ${escapeHtml(a.activityId || '-')}<br>
            แม่งาน: ${escapeHtml(a.ownerTeam || '-')} / ${escapeHtml(a.ownerName || '-')}<br>
            วันที่กิจกรรม: ${escapeHtml(a.eventDate || '-')}<br>
            หมายเหตุ: ${escapeHtml(a.note || '-')}
          </div>
        </div>
        <span class="badge ${statusClass(a.status)}">${escapeHtml(a.status || 'รอดำเนินการ')}</span>
      </div>

      <div class="activity-actions">
        <span class="small-note">ปรับสถานะกิจกรรม</span>
        <select onchange="changeActivityStatus('${escapeAttr(a.activityId)}', this.value)">
          ${statusOptions(a.status)}
        </select>
      </div>

      <div class="support-list">${supportHtml}</div>
    </article>
  `;
}

function renderSupportItem(s) {
  return `
    <div class="support-item">
      <div>
        <div class="support-title">${escapeHtml(s.requestTeam || '-')} — ${escapeHtml(s.requestTitle || '-')}</div>
        <div>${escapeHtml(s.requestDetail || '')}</div>
        <div class="meta">
          ผู้ประสานงาน: ${escapeHtml(s.responsible || '-')} | กำหนด: ${escapeHtml(s.deadline || '-')} | รหัส: ${escapeHtml(s.requestId || '-')}
        </div>
      </div>
      <div class="support-actions">
        <select onchange="changeSupportStatus('${escapeAttr(s.requestId)}', this.value)">
          ${statusOptions(s.status)}
        </select>
      </div>
    </div>
  `;
}

async function submitActivity(e) {
  e.preventDefault();

  const btn = document.getElementById('activitySubmitBtn');
  btn.disabled = true;
  btn.textContent = 'กำลังบันทึก...';

  const payload = {
    activityName: document.getElementById('activityName').value,
    ownerTeam: document.getElementById('ownerTeam').value,
    ownerName: document.getElementById('ownerName').value,
    eventDate: document.getElementById('eventDate').value,
    status: document.getElementById('activityStatus').value,
    note: document.getElementById('activityNote').value
  };

  try {
    await apiPost('addActivity', payload);
    document.getElementById('activityForm').reset();
    showToast('บันทึกกิจกรรมแล้ว');
  } catch (err) {
    alert(err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'บันทึกกิจกรรมใหม่';
  }
}

async function submitSupport(e) {
  e.preventDefault();

  const btn = document.getElementById('supportSubmitBtn');
  btn.disabled = true;
  btn.textContent = 'กำลังบันทึก...';

  const payload = {
    activityId: document.getElementById('activityId').value,
    requestTeam: document.getElementById('requestTeam').value,
    requestTitle: document.getElementById('requestTitle').value,
    requestDetail: document.getElementById('requestDetail').value,
    responsible: document.getElementById('responsible').value,
    deadline: document.getElementById('deadline').value,
    status: document.getElementById('requestStatus').value
  };

  try {
    await apiPost('addSupportRequest', payload);
    document.getElementById('supportForm').reset();
    showToast('บันทึกคำขอสนับสนุนแล้ว');
  } catch (err) {
    alert(err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'บันทึกคำขอสนับสนุน';
  }
}

async function changeActivityStatus(activityId, status) {
  await apiPost('updateActivityStatus', { activityId, status });
  showToast('อัปเดตสถานะกิจกรรมแล้ว');
}

async function changeSupportStatus(requestId, status) {
  await apiPost('updateSupportStatus', { requestId, status });
  showToast('อัปเดตสถานะคำขอแล้ว');
}

function statusOptions(current) {
  return statuses.map(s =>
    `<option value="${escapeAttr(s)}" ${s === current ? 'selected' : ''}>${escapeHtml(s)}</option>`
  ).join('');
}

function statusClass(status) {
  if (status === 'เสร็จแล้ว') return 'status-done';
  if (status === 'กำลังดำเนินการ') return 'status-doing';
  return 'status-todo';
}

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
