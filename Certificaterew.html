<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ระบบสร้างใบประกาศ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@300;400;500;600&family=Noto+Sans+Thai:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans Thai',sans-serif;
  background:#f9eaed;
  min-height:100vh;
  padding:24px 16px 48px;
  color:#1a1a1a;
}
.wrap{max-width:560px;margin:0 auto;}
.header{text-align:center;margin-bottom:24px;}
.header h1{
  font-family:'Noto Serif Thai',serif;
  font-size:22px;font-weight:500;color:#1a1a1a;margin-bottom:4px;
}
.header p{font-size:13px;color:#888;}

.card{
  background:#fff;border-radius:18px;padding:24px;
  box-shadow:0 2px 16px rgba(0,0,0,0.06);
  margin-bottom:16px;
}
.card-title{
  font-family:'Noto Serif Thai',serif;
  font-size:16px;font-weight:500;margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
  padding-bottom:10px;border-bottom:1px solid #f0ede8;
}
.form-row{margin-bottom:16px;}
label{display:block;font-size:13px;color:#555;margin-bottom:6px;font-weight:500;}
select, input[type="text"], input[type="number"], textarea{
  width:100%;padding:11px 14px;
  border:1.5px solid #e0ddd9;border-radius:10px;
  font-size:14px;font-family:'Noto Sans Thai',sans-serif;
  color:#1a1a1a;background:#fafaf8;transition:border-color .2s;
}
select:focus, input:focus, textarea:focus{
  outline:none;border-color:#7a0019;background:#fff;
}
textarea{resize:vertical;min-height:80px;line-height:1.7;}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

/* color picker */
.color-wrap{display:flex;align-items:center;gap:10px;}
.color-wrap input[type="color"]{
  width:44px;height:44px;padding:2px;
  border-radius:8px;cursor:pointer;flex-shrink:0;
}
.color-wrap input[type="text"]{flex:1;}

/* preview สี */
.font-preview{
  margin-top:10px;padding:12px 16px;
  background:#f9f6f0;border-radius:10px;
  text-align:center;font-size:20px;
  border:1px solid #ebe8e4;
  transition:.2s;
}

/* ปุ่ม */
.btn-submit{
  width:100%;padding:14px;
  background:#7a0019;color:#fff;border:none;
  border-radius:12px;font-size:15px;
  font-family:'Noto Sans Thai',sans-serif;font-weight:500;
  cursor:pointer;transition:.2s;
}
.btn-submit:hover{background:#5c0013;}
.btn-submit:disabled{background:#ccc;cursor:not-allowed;}

/* result */
.result-box{
  display:none;
  background:#fff;border-radius:18px;padding:24px;
  box-shadow:0 2px 16px rgba(0,0,0,0.06);
  text-align:center;margin-top:16px;
}
.result-box.show{display:block;}
.result-icon{font-size:48px;margin-bottom:12px;}
.result-box h2{font-family:'Noto Serif Thai',serif;font-size:18px;margin-bottom:8px;}
.result-box p{font-size:13px;color:#666;margin-bottom:16px;}
.btn-open{
  display:inline-block;padding:12px 28px;
  background:#7a0019;color:#fff;border-radius:10px;
  text-decoration:none;font-size:14px;font-weight:500;
  transition:.2s;margin-right:8px;
}
.btn-open:hover{background:#5c0013;}
.btn-new{
  display:inline-block;padding:12px 20px;
  background:transparent;color:#555;
  border:1.5px solid #ddd;border-radius:10px;
  text-decoration:none;font-size:14px;
  cursor:pointer;transition:.2s;
  font-family:'Noto Sans Thai',sans-serif;
}
.btn-new:hover{background:#f5f5f5;}

.loading-msg{
  display:none;text-align:center;
  padding:20px;color:#888;font-size:14px;
}
.loading-msg.show{display:block;}
.spinner{
  width:32px;height:32px;border:3px solid #f0cdd3;
  border-top-color:#7a0019;border-radius:50%;
  animation:spin .8s linear infinite;
  margin:0 auto 10px;
}
@keyframes spin{to{transform:rotate(360deg)}}

.error-msg{
  display:none;color:#c0392b;font-size:13px;
  text-align:center;margin-top:10px;
}
.error-msg.show{display:block;}

/* font options */
.font-list{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
}
.font-btn{
  padding:8px;border:1.5px solid #e0ddd9;border-radius:8px;
  background:#fafaf8;cursor:pointer;text-align:center;
  font-size:13px;transition:.2s;
}
.font-btn.active{border-color:#7a0019;background:#fff8f8;color:#7a0019;}
.font-btn:hover{border-color:#d4818f;}
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <h1>🏆 ระบบสร้างใบประกาศ</h1>
    <p>สมาคมปึงเถ่ากงม่าขอนแก่น</p>
  </div>

  <div id="mainForm">
    <!-- เลือก template -->
    <div class="card">
      <div class="card-title">📋 เลือกประเภทเอกสาร</div>
      <div class="form-row">
        <label>ประเภทใบประกาศ</label>
        <select id="templateId">
          <option value="">กำลังโหลด...</option>
        </select>
      </div>
    </div>

    <!-- ข้อมูล -->
    <div class="card">
      <div class="card-title">✏️ ข้อมูลผู้รับ</div>
      <div class="form-row">
        <label>ชื่อผู้รับ ({{NAME}})</label>
        <input type="text" id="name" placeholder="กรอกชื่อ-นามสกุล"/>
      </div>
      <div class="form-row">
        <label>เรื่อง / รายละเอียด ({{EVENT}})</label>
        <textarea id="event" placeholder="กรอกเรื่องหรือรายละเอียด"></textarea>
      </div>
    </div>

    <!-- ตั้งค่าฟอนต์ -->
    <div class="card">
      <div class="card-title">🎨 ตั้งค่าชื่อผู้รับ</div>
      <div class="form-row">
        <label>เลือก Font</label>
        <div class="font-list" id="fontList">
          <div class="font-btn active" data-font="Noto Serif Thai" style="font-family:'Noto Serif Thai',serif;">Noto Serif</div>
          <div class="font-btn" data-font="Sarabun" style="font-family:'Sarabun',sans-serif;">Sarabun</div>
          <div class="font-btn" data-font="Prompt" style="font-family:'Prompt',sans-serif;">Prompt</div>
          <div class="font-btn" data-font="Kanit" style="font-family:'Kanit',sans-serif;">Kanit</div>
          <div class="font-btn" data-font="Mitr" style="font-family:'Mitr',sans-serif;">Mitr</div>
          <div class="font-btn" data-font="Pridi" style="font-family:'Pridi',serif;">Pridi</div>
        </div>
        <input type="hidden" id="font" value="Noto Serif Thai"/>
      </div>
      <div class="row2">
        <div class="form-row">
          <label>ขนาด Font (pt)</label>
          <input type="number" id="fontSize" value="36" min="8" max="120"/>
        </div>
        <div class="form-row">
          <label>สีตัวอักษร</label>
          <div class="color-wrap">
            <input type="color" id="fontColorPicker" value="#1a1a1a"/>
            <input type="text" id="fontColor" value="#1a1a1a" placeholder="#000000"/>
          </div>
        </div>
      </div>
      <div class="font-preview" id="fontPreview">ตัวอย่างชื่อผู้รับ</div>
    </div>

    <button class="btn-submit" onclick="generate()">สร้างใบประกาศ</button>
    <div class="loading-msg" id="loadingMsg">
      <div class="spinner"></div>
      กำลังสร้างใบประกาศ กรุณารอสักครู่...
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- ผลลัพธ์ -->
  <div class="result-box" id="resultBox">
    <div class="result-icon">✅</div>
    <h2>สร้างใบประกาศสำเร็จ!</h2>
    <p>ใบประกาศถูกบันทึกใน Google Drive แล้วครับ</p>
    <a id="pdfLink" href="#" target="_blank" class="btn-open">เปิด PDF</a>
    <button class="btn-new" onclick="resetForm()">สร้างใบใหม่</button>
  </div>
</div>

<script>
let selectedFont = 'Noto Serif Thai';

// โหลด template list
google.script.run
  .withSuccessHandler(function(templates) {
    var sel = document.getElementById('templateId');
    sel.innerHTML = '';
    templates.forEach(function(t) {
      var opt = document.createElement('option');
      opt.value = t.id;
      opt.textContent = t.name;
      sel.appendChild(opt);
    });
  })
  .getTemplates();

// เลือก font
document.getElementById('fontList').addEventListener('click', function(e) {
  var btn = e.target.closest('.font-btn');
  if (!btn) return;
  document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedFont = btn.dataset.font;
  document.getElementById('font').value = selectedFont;
  updatePreview();
});

// sync color picker กับ text input
document.getElementById('fontColorPicker').addEventListener('input', function() {
  document.getElementById('fontColor').value = this.value;
  updatePreview();
});
document.getElementById('fontColor').addEventListener('input', function() {
  var val = this.value;
  if (/^#[0-9A-Fa-f]{6}$/.test(val)) {
    document.getElementById('fontColorPicker').value = val;
  }
  updatePreview();
});
document.getElementById('fontSize').addEventListener('input', updatePreview);
document.getElementById('name').addEventListener('input', updatePreview);

function updatePreview() {
  var preview = document.getElementById('fontPreview');
  var name = document.getElementById('name').value || 'ตัวอย่างชื่อผู้รับ';
  var size = document.getElementById('fontSize').value || 36;
  var color = document.getElementById('fontColor').value || '#1a1a1a';
  preview.style.fontFamily = selectedFont + ', serif';
  preview.style.fontSize = Math.min(size, 32) + 'px';
  preview.style.color = color;
  preview.style.fontWeight = 'bold';
  preview.textContent = name;
}

function generate() {
  var templateId = document.getElementById('templateId').value;
  var name = document.getElementById('name').value.trim();
  var event = document.getElementById('event').value.trim();
  var font = selectedFont;
  var fontSize = document.getElementById('fontSize').value;
  var fontColor = document.getElementById('fontColor').value;

  if (!templateId) { showError('กรุณาเลือกประเภทเอกสาร'); return; }
  if (!name) { showError('กรุณากรอกชื่อผู้รับ'); return; }
  if (!event) { showError('กรุณากรอกเรื่อง / รายละเอียด'); return; }

  document.getElementById('loadingMsg').classList.add('show');
  document.getElementById('errorMsg').classList.remove('show');
  document.querySelector('.btn-submit').disabled = true;

  google.script.run
    .withSuccessHandler(function(url) {
      document.getElementById('loadingMsg').classList.remove('show');
      document.getElementById('mainForm').style.display = 'none';
      document.getElementById('pdfLink').href = url;
      document.getElementById('resultBox').classList.add('show');
    })
    .withFailureHandler(function(err) {
      document.getElementById('loadingMsg').classList.remove('show');
      document.querySelector('.btn-submit').disabled = false;
      showError('เกิดข้อผิดพลาด: ' + err.message);
    })
    .generateCertificate(templateId, name, event, font, fontSize, fontColor);
}

function showError(msg) {
  var el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

function resetForm() {
  document.getElementById('mainForm').style.display = 'block';
  document.getElementById('resultBox').classList.remove('show');
  document.getElementById('name').value = '';
  document.getElementById('event').value = '';
  document.querySelector('.btn-submit').disabled = false;
  document.getElementById('errorMsg').classList.remove('show');
  updatePreview();
}

updatePreview();
</script>
</body>
</html>
