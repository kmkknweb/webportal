<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Poster Generator</title>

<!-- โหลด Fabric -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

<!-- ฟอนต์ไทย -->
<link href="https://fonts.googleapis.com/css2?family=Kanit&family=Prompt&display=swap" rel="stylesheet">

<style>
body {
  font-family: Kanit, sans-serif;
  background: #111;
  color: white;
  margin: 0;
  padding: 10px;
}

#toolbar {
  margin-bottom: 10px;
}

button, select, input {
  margin: 5px;
  padding: 5px;
}

canvas {
  border: 2px solid #444;
  background: #000;
}
</style>
</head>

<body>

<h2>Poster Generator</h2>

<div id="toolbar">

  <!-- เลือก template -->
  <select id="templateSelect">
    <option value="templates/template1.png">Template 1</option>
    <option value="templates/template2.png">Template 2</option>
  </select>

  <!-- เพิ่มข้อความ -->
  <button onclick="addText()">+ Text</button>

  <!-- ฟอนต์ -->
  <select id="fontFamily">
    <option value="Kanit">Kanit</option>
    <option value="Prompt">Prompt</option>
  </select>

  <!-- ขนาด -->
  <input type="number" id="fontSize" value="60">

  <!-- สี -->
  <input type="color" id="color" value="#ffffff">

  <!-- ตัวหนา -->
  <button onclick="toggleBold()">Bold</button>

  <!-- อัปโหลดรูป -->
  <input type="file" id="upload">

  <!-- ดาวน์โหลด -->
  <button onclick="download()">Download PNG</button>

</div>

<canvas id="c" width="1080" height="1080"></canvas>

<script>
const canvas = new fabric.Canvas('c');

let selectedObject = null;

// โหลด template
function loadTemplate(url) {
  fabric.Image.fromURL(url, function(img) {
    img.selectable = false;
    canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {
      scaleX: canvas.width / img.width,
      scaleY: canvas.height / img.height
    });
  });
}

// โหลด default
loadTemplate("templates/template1.png");

// เปลี่ยน template
document.getElementById('templateSelect').onchange = function() {
  loadTemplate(this.value);
};

// เพิ่มข้อความ
function addText() {
  const text = new fabric.IText('พิมพ์ข้อความ', {
    left: 200,
    top: 200,
    fontFamily: 'Kanit',
    fontSize: 60,
    fill: '#ffffff'
  });
  canvas.add(text);
  canvas.setActiveObject(text);
}

// เลือก object
canvas.on('selection:created', e => selectedObject = e.selected[0]);
canvas.on('selection:updated', e => selectedObject = e.selected[0]);

// เปลี่ยนฟอนต์
document.getElementById('fontFamily').onchange = function() {
  if (!selectedObject) return;
  selectedObject.set('fontFamily', this.value);
  canvas.renderAll();
};

// เปลี่ยนขนาด
document.getElementById('fontSize').oninput = function() {
  if (!selectedObject) return;
  selectedObject.set('fontSize', parseInt(this.value));
  canvas.renderAll();
};

// เปลี่ยนสี
document.getElementById('color').oninput = function() {
  if (!selectedObject) return;
  selectedObject.set('fill', this.value);
  canvas.renderAll();
};

// ตัวหนา
function toggleBold() {
  if (!selectedObject) return;
  selectedObject.set('fontWeight',
    selectedObject.fontWeight === 'bold' ? 'normal' : 'bold'
  );
  canvas.renderAll();
}

// อัปโหลดรูป
document.getElementById('upload').onchange = function(e) {
  const reader = new FileReader();
  reader.onload = function(event) {
    fabric.Image.fromURL(event.target.result, function(img) {
      img.set({
        left: 200,
        top: 300,
        scaleX: 0.5,
        scaleY: 0.5
      });
      canvas.add(img);
    });
  };
  reader.readAsDataURL(e.target.files[0]);
};

// ดาวน์โหลด
function download() {
  const link = document.createElement('a');
  link.download = 'poster.png';
  link.href = canvas.toDataURL({
    format: 'png',
    quality: 1
  });
  link.click();
}
</script>

</body>
</html>
