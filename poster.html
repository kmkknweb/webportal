<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Poster Maker</title>

  <!-- Fabric.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

  <!-- Thai fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Kanit, Prompt, Sarabun, sans-serif;
      background: #f5f2ed;
      color: #2b2b2b;
    }
    header {
      padding: 14px 18px;
      background: #7f1d1d;
      color: white;
      font-size: 20px;
      font-weight: 600;
    }
    .app {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
      padding: 16px;
    }
    .panel {
      background: white;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 4px 18px rgba(0,0,0,.08);
      height: fit-content;
    }
    .stage-wrap {
      background: white;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 4px 18px rgba(0,0,0,.08);
      overflow: auto;
    }
    .canvas-box {
      width: 100%;
      display: flex;
      justify-content: center;
    }
    canvas {
      border: 1px solid #ddd;
      max-width: 100%;
      height: auto !important;
    }
    h3 {
      margin: 10px 0 8px;
      font-size: 16px;
    }
    label {
      display: block;
      margin-top: 10px;
      font-size: 13px;
      color: #555;
    }
    input, select, textarea, button {
      width: 100%;
      font-family: inherit;
      font-size: 14px;
      border-radius: 10px;
      border: 1px solid #d4d4d4;
      padding: 9px 10px;
      margin-top: 5px;
    }
    textarea { min-height: 70px; resize: vertical; }
    button {
      cursor: pointer;
      border: 0;
      background: #8b1e1e;
      color: white;
      font-weight: 600;
    }
    button.secondary { background: #6b7280; }
    button.danger { background: #b91c1c; }
    button.light {
      background: #eee;
      color: #222;
      border: 1px solid #ddd;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .row3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .note {
      font-size: 12px;
      color: #666;
      line-height: 1.45;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      padding: 8px;
      border-radius: 10px;
      margin-top: 10px;
    }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      header { font-size: 18px; }
    }
  </style>
</head>

<body>
<header>Mini Poster Maker — ระบบทำภาพโพสต์จาก Template</header>

<div class="app">
  <aside class="panel">
    <h3>1) Template</h3>
    <label>เลือก Template</label>
    <select id="templateSelect">
      <option value="templates/template01.png">Template 01</option>
    </select>

    <label>หรืออัปโหลด Template PNG เอง</label>
    <input type="file" id="uploadTemplate" accept="image/png,image/jpeg" />

    <div class="note">
      ถ้าใช้ template จาก Canva ให้ export เป็น PNG แล้วอัปโหลดตรงนี้ได้เลย
    </div>

    <h3>2) ข้อความ</h3>
    <label>ข้อความ</label>
    <textarea id="textInput">พิมพ์ข้อความ</textarea>

    <button id="addTextBtn">เพิ่มข้อความลงภาพ</button>

    <label>ฟอนต์</label>
    <select id="fontFamily">
      <option value="Kanit">Kanit</option>
      <option value="Prompt">Prompt</option>
      <option value="Sarabun">Sarabun</option>
      <option value="Arial">Arial</option>
    </select>

    <div class="row">
      <div>
        <label>ขนาด</label>
        <input type="number" id="fontSize" value="56" min="8" max="200" />
      </div>
      <div>
        <label>สี</label>
        <input type="color" id="fontColor" value="#ffffff" />
      </div>
    </div>

    <div class="row3">
      <button class="light" id="boldBtn">หนา</button>
      <button class="light" id="alignLeftBtn">ซ้าย</button>
      <button class="light" id="alignCenterBtn">กลาง</button>
    </div>

    <h3>3) รูปภาพ</h3>
    <label>อัปโหลดรูปกลาง / รูปประกอบ</label>
    <input type="file" id="uploadImage" accept="image/*" />

    <div class="row">
      <button class="secondary" id="bringForwardBtn">เอาขึ้นหน้า</button>
      <button class="secondary" id="sendBackBtn">ส่งลงหลัง</button>
    </div>

    <h3>4) จัดการ</h3>
    <div class="row">
      <button class="danger" id="deleteBtn">ลบสิ่งที่เลือก</button>
      <button class="light" id="clearBtn">ล้างข้อความ/รูป</button>
    </div>

    <button id="downloadBtn" style="margin-top:12px;">ดาวน์โหลด PNG</button>

    <div class="note">
      วิธีใช้: เลือก template → เพิ่มข้อความหรือรูป → คลิกสิ่งที่ต้องการแก้ → ลาก/ย่อ/ขยาย → ดาวน์โหลด PNG
    </div>
  </aside>

  <main class="stage-wrap">
    <div class="canvas-box">
      <canvas id="posterCanvas" width="1080" height="1080"></canvas>
    </div>
  </main>
</div>

<script>
  const CANVAS_SIZE = 1080;

  const canvas = new fabric.Canvas('posterCanvas', {
    width: CANVAS_SIZE,
    height: CANVAS_SIZE,
    preserveObjectStacking: true,
    backgroundColor: '#ffffff'
  });

  function fitBackground(img) {
    const scaleX = CANVAS_SIZE / img.width;
    const scaleY = CANVAS_SIZE / img.height;
    img.set({
      left: 0,
      top: 0,
      scaleX,
      scaleY,
      selectable: false,
      evented: false
    });
    canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
  }

  function loadTemplate(src) {
    fabric.Image.fromURL(src, function(img) {
      fitBackground(img);
    }, { crossOrigin: 'anonymous' });
  }

  loadTemplate('templates/template01.png');

  document.getElementById('templateSelect').addEventListener('change', function() {
    loadTemplate(this.value);
  });

  document.getElementById('uploadTemplate').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(evt) {
      fabric.Image.fromURL(evt.target.result, function(img) {
        fitBackground(img);
      });
    };
    reader.readAsDataURL(file);
  });

  function activeText() {
    const obj = canvas.getActiveObject();
    if (obj && obj.type === 'i-text') return obj;
    return null;
  }

  function applyTextControls(obj) {
    if (!obj || obj.type !== 'i-text') return;
    obj.set({
      fontFamily: document.getElementById('fontFamily').value,
      fontSize: parseInt(document.getElementById('fontSize').value, 10),
      fill: document.getElementById('fontColor').value
    });
    canvas.requestRenderAll();
  }

  document.getElementById('addTextBtn').addEventListener('click', function() {
    const textValue = document.getElementById('textInput').value || 'พิมพ์ข้อความ';

    const text = new fabric.IText(textValue, {
      left: 540,
      top: 150,
      originX: 'center',
      fontFamily: document.getElementById('fontFamily').value,
      fontSize: parseInt(document.getElementById('fontSize').value, 10),
      fill: document.getElementById('fontColor').value,
      fontWeight: 'normal',
      textAlign: 'center',
      editable: true,
      lineHeight: 1.2
    });

    canvas.add(text);
    canvas.setActiveObject(text);
    canvas.requestRenderAll();
  });

  document.getElementById('fontFamily').addEventListener('change', function() {
    const obj = activeText();
    if (obj) applyTextControls(obj);
  });

  document.getElementById('fontSize').addEventListener('input', function() {
    const obj = activeText();
    if (obj) applyTextControls(obj);
  });

  document.getElementById('fontColor').addEventListener('input', function() {
    const obj = activeText();
    if (obj) applyTextControls(obj);
  });

  document.getElementById('boldBtn').addEventListener('click', function() {
    const obj = activeText();
    if (!obj) return;
    obj.set('fontWeight', obj.fontWeight === 'bold' ? 'normal' : 'bold');
    canvas.requestRenderAll();
  });

  document.getElementById('alignLeftBtn').addEventListener('click', function() {
    const obj = activeText();
    if (!obj) return;
    obj.set('textAlign', 'left');
    canvas.requestRenderAll();
  });

  document.getElementById('alignCenterBtn').addEventListener('click', function() {
    const obj = activeText();
    if (!obj) return;
    obj.set('textAlign', 'center');
    canvas.requestRenderAll();
  });

  document.getElementById('uploadImage').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(evt) {
      fabric.Image.fromURL(evt.target.result, function(img) {
        const maxW = 650;
        const maxH = 500;
        const scale = Math.min(maxW / img.width, maxH / img.height);

        img.set({
          left: 540,
          top: 540,
          originX: 'center',
          originY: 'center',
          scaleX: scale,
          scaleY: scale
        });

        canvas.add(img);
        canvas.setActiveObject(img);
        canvas.requestRenderAll();
      });
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('bringForwardBtn').addEventListener('click', function() {
    const obj = canvas.getActiveObject();
    if (!obj) return;
    canvas.bringForward(obj);
    canvas.requestRenderAll();
  });

  document.getElementById('sendBackBtn').addEventListener('click', function() {
    const obj = canvas.getActiveObject();
    if (!obj) return;
    canvas.sendBackwards(obj);
    canvas.requestRenderAll();
  });

  document.getElementById('deleteBtn').addEventListener('click', function() {
    const obj = canvas.getActiveObject();
    if (!obj) return;
    canvas.remove(obj);
    canvas.discardActiveObject();
    canvas.requestRenderAll();
  });

  document.getElementById('clearBtn').addEventListener('click', function() {
    canvas.getObjects().forEach(obj => canvas.remove(obj));
    canvas.discardActiveObject();
    canvas.requestRenderAll();
  });

  document.addEventListener('keydown', function(e) {
    if ((e.key === 'Delete' || e.key === 'Backspace') && canvas.getActiveObject()) {
      const active = canvas.getActiveObject();
      if (active.isEditing) return;
      canvas.remove(active);
      canvas.requestRenderAll();
    }
  });

  canvas.on('selection:created', syncControlsFromSelection);
  canvas.on('selection:updated', syncControlsFromSelection);

  function syncControlsFromSelection() {
    const obj = activeText();
    if (!obj) return;
    document.getElementById('textInput').value = obj.text || '';
    document.getElementById('fontFamily').value = obj.fontFamily || 'Kanit';
    document.getElementById('fontSize').value = obj.fontSize || 56;
    document.getElementById('fontColor').value = obj.fill || '#ffffff';
  }

  document.getElementById('textInput').addEventListener('input', function() {
    const obj = activeText();
    if (!obj) return;
    obj.set('text', this.value);
    canvas.requestRenderAll();
  });

  document.getElementById('downloadBtn').addEventListener('click', function() {
    canvas.discardActiveObject();
    canvas.requestRenderAll();

    const dataURL = canvas.toDataURL({
      format: 'png',
      quality: 1,
      multiplier: 1
    });

    const link = document.createElement('a');
    link.href = dataURL;
    link.download = 'facebook-poster.png';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  });
</script>

</body>
</html>
